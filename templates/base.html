<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Member Management{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <!-- System Title -->
        <a class="navbar-brand fw-bold text-white" href="/" style="font-size: 2rem;">
            Member Management System
        </a>

        <!-- Toggle Button (Mobile) -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item me-3">
                    <a class="nav-link text-white fw-semibold" href="/">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item me-3">
                    <a class="nav-link text-white fw-semibold" href="/register">
                        Register Member
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white fw-semibold" href="/members">
                        View Members
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Main Content -->
<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}

            {% for category, message in messages %}

                <div class="alert alert-{{ category }} alert-dismissible fade show">

                    {{ message }}

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                    </button>

                </div>

            {% endfor %}

        {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
