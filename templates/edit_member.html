{% extends "base.html" %}

{% block title %}Edit Member{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">
        <h3>Edit Member</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input
                    type="text"
                    class="form-control"
                    name="full_name"
                    value="{{ member.full_name }}"
                    required>
            </div>

            <div class="mb-3">
                <label>National ID Number</label>
                <input
                    type="text"
                    class="form-control"
                    name="id_number"
                    value="{{ member.id_number }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Next of Kin</label>
                <input
                    type="text"
                    class="form-control"
                    name="next_of_kin"
                    value="{{ member.next_of_kin }}"
                    required>
            </div>

            <button class="btn btn-success">
                Update Member
            </button>

            <a href="/members" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
